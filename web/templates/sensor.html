<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<title>PI·HOME Sensor</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#0a0d12;--card:#161c28;--border:#1e2535;--text:#e8edf5;--muted:#5a6480;--dim:#3a4255;--accent:#4fc3f7;--green:#69db7c;--red:#ff6b6b;--warm:#ffb347;--font:'Segoe UI',sans-serif;--mono:'Consolas',monospace;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);overflow:hidden;}
.screen{display:flex;flex-direction:column;height:100vh;padding:14px;gap:10px;}
.header{display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.logo{font-size:16px;font-weight:800;color:var(--accent);}
.conn-pill{font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;border:1px solid;}
.conn-pill.on{background:rgba(105,219,124,.15);color:var(--green);border-color:rgba(105,219,124,.3);}
.conn-pill.off{background:var(--border);color:var(--muted);border-color:var(--border);}
.setup{display:flex;flex-direction:column;gap:12px;flex:1;justify-content:center;}
.setup h2{font-size:18px;font-weight:700;text-align:center;}
.setup p{font-size:13px;color:var(--muted);text-align:center;}
.field label{font-size:12px;font-weight:600;color:var(--muted);display:block;margin-bottom:4px;}
.field input{width:100%;padding:12px;border-radius:8px;background:var(--card);border:1px solid var(--border);color:var(--text);font-size:15px;font-family:var(--font);}
input[type=range]{-webkit-appearance:none;width:100%;height:6px;background:var(--border);border-radius:3px;outline:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:var(--red);cursor:pointer;border:2px solid var(--card);}
.cam-toggle{display:flex;align-items:center;justify-content:space-between;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px;}
.toggle{position:relative;width:44px;height:24px;}
.toggle input{opacity:0;width:0;height:0;}
.slider-t{position:absolute;inset:0;background:var(--border);border-radius:12px;transition:.3s;}
.slider-t:before{content:'';position:absolute;width:18px;height:18px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.3s;}
input:checked+.slider-t{background:var(--green);}
input:checked+.slider-t:before{transform:translateX(20px);}
.btn-big{width:100%;padding:16px;border-radius:12px;border:none;font-size:16px;font-weight:700;cursor:pointer;font-family:var(--font);}
.btn-start{background:var(--accent);color:#000;}
.live{display:none;flex-direction:column;gap:10px;flex:1;min-height:0;}
.cam-wrap{position:relative;flex-shrink:0;border-radius:12px;overflow:hidden;background:#000;height:175px;}
.cam-wrap video{width:100%;height:100%;object-fit:cover;}
.cam-off{width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:var(--dim);font-size:13px;flex-direction:column;gap:6px;}
.rec-badge{position:absolute;top:10px;right:10px;background:rgba(255,59,59,.9);color:#fff;font-size:12px;font-weight:700;padding:4px 10px;border-radius:20px;display:none;align-items:center;gap:6px;}
.rec-badge.show{display:flex;}
.rec-dot{width:8px;height:8px;border-radius:50%;background:#fff;animation:pulse 1s infinite;}
.db-section{flex-shrink:0;}
.db-row{display:flex;align-items:flex-end;gap:12px;margin-bottom:6px;}
.db-big{font-family:var(--mono);font-size:64px;font-weight:300;line-height:1;transition:color .3s;}
.db-unit{font-family:var(--mono);font-size:16px;color:var(--muted);margin-bottom:6px;}
.peak-info{font-family:var(--mono);font-size:12px;color:var(--muted);}
.bar-wrap{height:16px;background:var(--border);border-radius:8px;overflow:hidden;position:relative;}
.bar-fill{height:100%;border-radius:8px;transition:width .1s,background .3s;}
.bar-mark{position:absolute;top:0;bottom:0;width:2px;background:rgba(255,80,80,.8);}
.bar-labels{display:flex;justify-content:space-between;font-family:var(--mono);font-size:10px;color:var(--dim);margin-top:3px;}
.thr-section{flex-shrink:0;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;}
.thr-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.thr-lbl{font-size:12px;font-weight:600;color:var(--muted);}
.thr-val{font-family:var(--mono);font-size:15px;color:var(--red);font-weight:600;}
.btn-stop{background:rgba(255,107,107,.15);color:var(--red);border:1px solid rgba(255,107,107,.3);border-radius:10px;padding:12px;font-size:14px;font-weight:700;font-family:var(--font);cursor:pointer;width:100%;flex-shrink:0;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
</style>
</head>
<body>
<div class="screen">
  <div class="header">
    <div class="logo">PI·HOME Sensor</div>
    <div class="conn-pill off" id="connPill">● Getrennt</div>
  </div>

  <div class="setup" id="setupScreen">
    <div><h2>🎙 Sensor einrichten</h2><p>Mikrofon + Kamera für Hunde-Erkennung</p></div>
    <div class="field"><label>Gerätename</label><input id="devName" value="Handy" placeholder="z.B. Handy 1"></div>
    <div class="field"><label>Raum</label><input id="devRoom" value="Wohnzimmer" placeholder="z.B. Wohnzimmer"></div>
    <div>
      <label style="font-size:12px;font-weight:600;color:var(--muted);display:block;margin-bottom:4px;">Schwellenwert: <strong id="setupThrVal" style="color:var(--red);">65</strong> dB</label>
      <input type="range" id="setupThr" min="30" max="100" value="65" oninput="document.getElementById('setupThrVal').textContent=this.value">
    </div>
    <div class="cam-toggle">
      <label style="font-size:14px;font-weight:600;">📷 Kamera aktivieren</label>
      <label class="toggle"><input type="checkbox" id="camToggle" checked><span class="slider-t"></span></label>
    </div>
    <button class="btn-big btn-start" onclick="startSensor()">▶ Sensor starten</button>
    <div id="setupError" style="color:var(--red);font-size:13px;text-align:center;display:none;"></div>
  </div>

  <div class="live" id="liveScreen">
    <div class="cam-wrap" id="camWrap">
      <video id="camVideo" autoplay muted playsinline style="display:none;"></video>
      <div class="cam-off" id="camOff">📷<span>Kein Kamerabild</span></div>
      <div class="rec-badge" id="recBadge"><div class="rec-dot"></div>REC</div>
    </div>
    <div class="db-section">
      <div class="db-row">
        <div class="db-big" id="dbBig" style="color:var(--accent);">0.0</div>
        <div class="db-unit">dB</div>
        <div class="peak-info">Peak: <span id="peakVal" style="color:var(--warm);">0.0</span> dB</div>
      </div>
      <div class="bar-wrap">
        <div class="bar-fill" id="barFill" style="width:0%;background:var(--accent);"></div>
        <div class="bar-mark" id="barMark" style="left:65%;"></div>
      </div>
      <div class="bar-labels"><span>0</span><span>50</span><span>100 dB</span></div>
    </div>
    <div class="thr-section">
      <div class="thr-row"><span class="thr-lbl">Schwellenwert</span><span class="thr-val" id="liveThrVal">65 dB</span></div>
      <input type="range" id="liveThr" min="30" max="100" value="65" oninput="onThrChange(this.value)" onchange="sendThreshold(this.value)">
    </div>
    <button class="btn-stop" onclick="stopSensor()">■ Sensor stoppen</button>
  </div>
</div>

<script>
const SERVER      = window.location.origin;
const RING_SECS   = 10;   // Sekunden VOR dem Ereignis
const POST_SECS   = 10;   // Sekunden NACH dem Ereignis
const CHUNK_MS    = 1000; // Video-Chunk alle 1 Sekunde

let socket      = null;
let audioCtx    = null;
let processor   = null;
let mainStream  = null;   // kombinierter Audio+Video Stream
let peakDb      = 0;
let threshold   = 65;
let useCam      = true;

// ── Video-Ringpuffer ───────────────────────────────────────
let ringRecorder  = null;   // läuft immer
let ringBuffer    = [];     // letzte RING_SECS Chunks
let capturing     = false;  // Ereignis aktiv
let captureChunks = [];     // Chunks fürs aktuelle Ereignis
let captureTimer  = null;

// ── Hilfsfunktionen ────────────────────────────────────────
function dbColor(db){
  if(db<40)return'#4fc3f7';if(db<55)return'#43a047';
  if(db<70)return'#f9a825';if(db<80)return'#e64a19';return'#ff3b3b';
}
function updateMeter(db){
  const col=dbColor(db);
  document.getElementById('dbBig').textContent=db.toFixed(1);
  document.getElementById('dbBig').style.color=col;
  document.getElementById('barFill').style.width=Math.min(100,(db/100)*100)+'%';
  document.getElementById('barFill').style.background=col;
  if(db>peakDb){ peakDb=db; document.getElementById('peakVal').textContent=peakDb.toFixed(1); }
}

// ── Sensor starten ─────────────────────────────────────────
async function startSensor(){
  const name = document.getElementById('devName').value.trim()||'Handy';
  const room = document.getElementById('devRoom').value.trim()||'Raum';
  threshold  = parseInt(document.getElementById('setupThr').value);
  useCam     = document.getElementById('camToggle').checked;
  const err  = document.getElementById('setupError');
  err.style.display='none';

  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){
    err.style.display='block';
    err.innerHTML='Mikrofon nicht verfügbar!<br>Chrome-Flag setzen:<br><code>chrome://flags/#unsafely-treat-insecure-origin-as-secure</code><br>→ Enabled → http://192.168.178.104:5000';
    return;
  }

  // Audio+Video zusammen anfordern (ein einziger getUserMedia-Aufruf)
  const audioConstraints = {echoCancellation:false,noiseSuppression:false,autoGainControl:false};
  const attempts = useCam ? [
    {audio:audioConstraints, video:{facingMode:'environment'}},
    {audio:audioConstraints, video:{facingMode:'user'}},
    {audio:audioConstraints, video:true},
    {audio:audioConstraints, video:false},
  ] : [{audio:audioConstraints, video:false}];

  for(const c of attempts){
    try{
      mainStream = await navigator.mediaDevices.getUserMedia(c);
      console.log('[Media] OK:', JSON.stringify(c));
      break;
    }catch(e){
      console.log('[Media] Fehlgeschlagen:',e.name,e.message);
    }
  }

  if(!mainStream){
    err.style.display='block';
    err.textContent='Mikrofon/Kamera-Zugriff verweigert.';
    return;
  }

  // Kamera-Preview
  const videoTracks = mainStream.getVideoTracks();
  const camVideo    = document.getElementById('camVideo');
  if(videoTracks.length>0){
    camVideo.srcObject = new MediaStream(videoTracks);
    camVideo.style.display='block';
    document.getElementById('camOff').style.display='none';
    useCam = true;
  }else{
    camVideo.style.display='none';
    document.getElementById('camOff').style.display='flex';
    useCam = false;
  }

  // WebSocket verbinden
  socket = io(SERVER,{transports:['websocket']});
  socket.on('connect',()=>{
    document.getElementById('connPill').className='conn-pill on';
    document.getElementById('connPill').textContent='● Verbunden';
    socket.emit('sensor_register',{name,room,threshold,camera:useCam});
  });
  socket.on('disconnect',()=>{
    document.getElementById('connPill').className='conn-pill off';
    document.getElementById('connPill').textContent='● Getrennt';
  });
  socket.on('registered',()=>{
    document.getElementById('setupScreen').style.display='none';
    const live=document.getElementById('liveScreen');
    live.style.display='flex';
    document.getElementById('liveThr').value=threshold;
    document.getElementById('liveThrVal').textContent=threshold+' dB';
    document.getElementById('barMark').style.left=Math.min(100,threshold)+'%';
    startAudio();
    if(useCam) startVideoRingBuffer();
  });
  socket.on('connect_error',e=>{
    err.style.display='block';
    err.textContent='Verbindungsfehler: '+e.message;
    stopSensor();
  });
}

// ── Audio-Verarbeitung (für dB + WebSocket) ────────────────
function startAudio(){
  const audioStream = new MediaStream(mainStream.getAudioTracks());
  audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  audioCtx.resume();
  const source  = audioCtx.createMediaStreamSource(audioStream);
  processor = audioCtx.createScriptProcessor(4096,1,1);

  processor.onaudioprocess = e=>{
    const data=e.inputBuffer.getChannelData(0);
    let sum=0; for(let i=0;i<data.length;i++) sum+=data[i]*data[i];
    const rms=Math.sqrt(sum/data.length);
    const db=rms<1e-10?0:Math.max(0,20*Math.log10(rms)+90);
    updateMeter(db);

    // Audio-Chunk an Server
    if(socket&&socket.connected){
      const bytes=new Uint8Array(data.buffer);
      let bin='';
      for(let i=0;i<bytes.length;i+=8192)
        bin+=String.fromCharCode(...bytes.subarray(i,i+8192));
      socket.emit('audio_chunk',{audio:btoa(bin),samplerate:audioCtx.sampleRate});
    }

    // Video-Aufnahme triggern
    if(db>=threshold) onThresholdExceeded();
  };
  source.connect(processor);
  processor.connect(audioCtx.destination);
}

// ── Video-Ringpuffer (Audio+Video, MIT Ton) ────────────────
function startVideoRingBuffer(){
  // WICHTIG: mainStream enthält Audio + Video → Ton ist im Video
  let mimeType = 'video/webm;codecs=vp8,opus';
  if(!MediaRecorder.isTypeSupported(mimeType)) mimeType = 'video/webm';

  ringRecorder = new MediaRecorder(mainStream, {mimeType});

  ringRecorder.ondataavailable = e=>{
    if(e.data && e.data.size>0){
      if(capturing){
        captureChunks.push(e.data);
      }else{
        ringBuffer.push(e.data);
        // Nur letzte RING_SECS Chunks behalten
        if(ringBuffer.length > RING_SECS) ringBuffer.shift();
      }
    }
  };

  ringRecorder.start(CHUNK_MS);  // Chunk jede Sekunde
  console.log('[Video] Ringpuffer gestartet. MIME:', mimeType);
}

function onThresholdExceeded(){
  if(!useCam||!ringRecorder) return;
  if(!capturing){
    // Ereignis beginnt: Ringpuffer übernehmen als Vorlauf
    capturing     = true;
    captureChunks = [...ringBuffer];  // letzte 10s als Vorlauf
    ringBuffer    = [];
    document.getElementById('recBadge').classList.add('show');
    console.log('[Video] Aufnahme gestartet, Vorlauf:', captureChunks.length, 'Chunks');
  }
  // Timer: X Sek nach letztem Ausschlag fertig
  clearTimeout(captureTimer);
  captureTimer = setTimeout(finishCapture, POST_SECS*1000);
}

function finishCapture(){
  if(!capturing) return;
  capturing = false;
  document.getElementById('recBadge').classList.remove('show');

  const chunks = [...captureChunks];
  captureChunks = [];

  // Blob erstellen und hochladen
  const mimeType = ringRecorder?.mimeType || 'video/webm';
  const blob = new Blob(chunks, {type: mimeType});

  const name = document.getElementById('devName')?.value||'Handy';
  const room = document.getElementById('devRoom')?.value||'Raum';

  console.log('[Video] Fertig. Größe:', Math.round(blob.size/1024), 'KB, Chunks:', chunks.length);

  const fd = new FormData();
  fd.append('video', blob, 'clip.webm');
  fd.append('room', room);
  fd.append('name', name);

  fetch('/api/sensors/upload_video', {method:'POST', body:fd})
    .then(r=>r.json())
    .then(d=>console.log('[Video] Hochgeladen:', d.filename))
    .catch(e=>console.error('[Video] Upload-Fehler:', e));
}

// ── Schwellenwert ──────────────────────────────────────────
function onThrChange(v){
  threshold=parseInt(v);
  document.getElementById('liveThrVal').textContent=v+' dB';
  document.getElementById('barMark').style.left=Math.min(100,threshold)+'%';
}
let thrTm=null;
function sendThreshold(v){
  clearTimeout(thrTm);
  thrTm=setTimeout(()=>{if(socket)socket.emit('sensor_threshold',{threshold:parseInt(v)});},300);
}

// ── Sensor stoppen ─────────────────────────────────────────
function stopSensor(){
  clearTimeout(captureTimer);
  if(ringRecorder&&ringRecorder.state!=='inactive') ringRecorder.stop();
  if(processor){processor.disconnect();processor=null;}
  if(audioCtx){audioCtx.close();audioCtx=null;}
  if(mainStream){mainStream.getTracks().forEach(t=>t.stop());mainStream=null;}
  if(socket){socket.disconnect();socket=null;}

  capturing=false;captureChunks=[];ringBuffer=[];
  document.getElementById('liveScreen').style.display='none';
  document.getElementById('setupScreen').style.display='flex';
  document.getElementById('connPill').className='conn-pill off';
  document.getElementById('connPill').textContent='● Getrennt';
  document.getElementById('recBadge').classList.remove('show');
  peakDb=0;
  document.getElementById('dbBig').textContent='0.0';
  document.getElementById('dbBig').style.color='var(--accent)';
  document.getElementById('barFill').style.width='0%';
  document.getElementById('camVideo').style.display='none';
  document.getElementById('camOff').style.display='flex';
}

// Wake Lock
async function wakeLock(){try{if('wakeLock'in navigator)await navigator.wakeLock.request('screen');}catch(e){}}
wakeLock();
document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='visible')wakeLock();});
</script>
</body>
</html>
